<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 교실 현황</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="game-window">
    <div class="window-header"><span>🏫 6학년 5반 실시간 교실</span></div>
    <div class="classroom-floor" id="floor"></div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
      authDomain: "secret-quest-class.firebaseapp.com",
      databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com", // ← 추가됨!
      projectId: "secret-quest-class",
      storageBucket: "secret-quest-class.firebasestorage.app",
      messagingSenderId: "397245266210",
      appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const floor = document.getElementById('floor');
    for(let i=1; i<=23; i++) {
        const d = document.createElement('div');
        d.className = 'desk'; d.id = `desk-${i}`;
        d.textContent = i + "번";
        floor.appendChild(d);
    }

    database.ref('room/').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        for(let key in data) {
            const s = data[key];
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.className = "desk online";
                desk.innerHTML = `${s.num}번<br>${s.name}`;
                desk.onclick = () => alert(`[${s.name}의 기록]\n${s.diary}`);
            }
        }
    });
</script>
</body>
</html>
