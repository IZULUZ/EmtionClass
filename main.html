<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마음 스캔 - 학생용</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #fdf6f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 900px; display: flex; gap: 20px; }
        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); flex: 1; }
        .stickman { width: 120px; margin-bottom: 15px; }
        .emotion-display { background: #1a1a1a; color: #ffd700; border-radius: 20px; padding: 20px; text-align: center; border: 4px solid #ffd700; }
        .mission-box { background: #fffbe6; border: 3px solid #f9d423; border-radius: 25px; padding: 20px; flex: 1.2; }
        .quest-item { background: white; border: 2px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .quest-item.selected { background: #f9d423; border-color: #f9d423; color: white; font-weight: bold; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10; }
        .modal-content { background:white; width:450px; margin: 50px auto; border-radius: 30px; padding: 20px; text-align: center; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; height: 200px; overflow-y: auto; margin: 15px 0; }
        button { background: #ff7b91; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>✨ 1번 홍길동의 마음 세탁소</h1>
    <div class="app-container">
        <div class="card">
            <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png" class="stickman">
            <div class="emotion-display">
                <div id="resEmoji" style="font-size: 60px;">?</div>
                <p id="resTag">감정을 스캔해주세요</p>
                <textarea id="diary" placeholder="오늘 왜 이런가요?" style="width:90%; border-radius:10px; padding:10px; margin-top:10px; border:none;"></textarea>
            </div>
            <button onclick="openModal()">감정 코드 스캔하기 🔍</button>
        </div>

        <div class="mission-box">
            <h3>📜 오늘의 마음 퀘스트</h3>
            <div id="questList"><p style="color:#999;">감정 스캔 완료 후 퀘스트가 열립니다.</p></div>
            <button id="finalBtn" style="display:none; background:#7c6df2;" onclick="submitData()">활동 완료! 교실 입장 🚪</button>
        </div>
    </div>

    <div id="emojiModal" class="modal">
        <div class="modal-content">
            <h3>감정 재료 고르기</h3>
            <div class="emoji-grid" id="grid"></div>
            <div style="font-size:30px; margin: 20px 0;">
                <span id="m1">?</span> + <span id="m2">?</span> = <span id="mR">?</span>
            </div>
            <button onclick="applyEmoji()">이모지 합성 완료!</button>
        </div>
    </div>

<script>
    const firebaseConfig = { /* 본인 정보 입력 */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const emojis = ["😊","😇","🥰","🤩","🥳","😆","😎","✨","🎈","🌈","😢","🥱","☁️","☔","💤","🧊","😡","⚡","💥","🌪️","🎈","🍀","⭐","💎"];
    let s1 = "", s2 = "", final = "";
    let selectedQuest = "";

    // 그룹별 구체적인 미션 풀
    const questPool = {
        green: ["친구에게 칭찬 쪽지 써서 전달하기", "선생님께 '도와드릴까요?' 여쭤보기", "오늘 배울 내용 목차 미리 적어보기", "내 책상 주변 쓰레기 3개 줍기"],
        blue: ["나를 위한 응원 문구 포스트잇에 적기", "장래희망 관련 책 한 권 찾아보기", "오늘의 기분 전환용 그림 그리기", "따뜻한 물 한 잔 마시고 인증하기"],
        red: ["심호흡 5번 크게 하고 선생님께 확인받기", "자리에 앉아 스트레칭 3종 세트 하기", "마음속 숫자를 10부터 0까지 천천히 세기", "기분 나쁜 일을 종이에 적어 구겨 버리기"]
    };

    function openModal() {
        document.getElementById('emojiModal').style.display = 'block';
        const g = document.getElementById('grid'); g.innerHTML = "";
        emojis.forEach(e => {
            const s = document.createElement('span'); s.textContent = e;
            s.style.cursor = 'pointer'; s.style.fontSize = '30px';
            s.onclick = () => { 
                if(!s1) { s1 = e; document.getElementById('m1').textContent = e; }
                else { s2 = e; document.getElementById('m2').textContent = e; 
                       final = "💎"; document.getElementById('mR').textContent = final; }
            };
            g.appendChild(s);
        });
    }

    function applyEmoji() {
        if(!final) return alert("두 개를 골라주세요!");
        document.getElementById('emojiModal').style.display = 'none';
        document.getElementById('resEmoji').textContent = final;
        document.getElementById('resTag').textContent = "신비로운 마음 상태";
        
        // 무작위 퀘스트 3개 추출 (여기선 예시로 green 그룹 사용)
        const list = document.getElementById('questList');
        list.innerHTML = "";
        const shuffled = questPool.green.sort(() => 0.5 - Math.random()).slice(0, 3);
        shuffled.forEach(q => {
            const d = document.createElement('div');
            d.className = 'quest-item'; d.textContent = q;
            d.onclick = () => {
                document.querySelectorAll('.quest-item').forEach(i => i.classList.remove('selected'));
                d.classList.add('selected'); selectedQuest = q;
                document.getElementById('finalBtn').style.display = 'block';
            };
            list.appendChild(d);
        });
    }

    function submitData() {
        database.ref('emotions/student1').set({
            name: "홍길동", num: 1, emoji: final, quest: selectedQuest, 
            diary: document.getElementById('diary').value, status: 'online'
        }).then(() => location.href = "classroom.html");
    }
</script>
</body>
</html>
